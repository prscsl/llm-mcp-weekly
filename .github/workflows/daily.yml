name: Daily Curation Build

on:
  # 기본은 수동 트리거. 무인 cron이 필요하면 schedule 블록 주석 해제.
  # (이 경우 ANTHROPIC_API_KEY secret 등록 필수 — Max 플랜은 GitHub Actions에서 사용 불가)
  # schedule:
  #   - cron: "0 21 * * *"   # 한국시간 06:00 = UTC 전날 21:00
  workflow_dispatch:
    inputs:
      date:
        description: "수집 기준일 (YYYY-MM-DD, 비워두면 오늘)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-curation
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "value=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Collect items
        run: python3 scripts/collect.py --date ${{ steps.date.outputs.value }}

      - name: Summarize with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/summarize.py --date ${{ steps.date.outputs.value }}

      - name: Publish post
        run: python3 scripts/publish.py --date ${{ steps.date.outputs.value }}

      - name: Commit and push
        run: |
          git config user.name "llm-mcp-weekly-bot"
          git config user.email "actions@github.com"
          git add _posts/ data/seen.json
          if git diff --staged --quiet; then
            echo "변경 없음. 커밋 스킵."
          else
            git commit -m "chore: daily curation ${{ steps.date.outputs.value }}"
            git push
          fi
