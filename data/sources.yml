# HackerNews Algolia Search API 키워드
hackernews_keywords:
  - keyword: claude
    min_points: 50
    weight: 8
  - keyword: anthropic
    min_points: 30
    weight: 7
  - keyword: "model context protocol"
    min_points: 20
    weight: 9
  - keyword: mcp server
    min_points: 15
    weight: 8
  - keyword: agentic
    min_points: 50
    weight: 7
  - keyword: coding agent
    min_points: 30
    weight: 8
  - keyword: local llm
    min_points: 100
    weight: 5

# 수집 정책
policy:
  max_items_per_run: 30
  lookback_days: 7
  language_filter: en  # 영문만 수집해 한국어로 가공
